name: Release

# Déclenché manuellement (workflow_dispatch) ou sur push d'un tag v*.
# Builde Glucose pour Windows + macOS (Intel + Apple Silicon) + Linux (.deb + .AppImage)
# et attache les artefacts à une nouvelle GitHub Release.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (ex: v0.3.0)"
        required: false

permissions:
  contents: write

jobs:
  release:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            label: Windows x64 (NSIS)
            args: "--bundles nsis"
          # macos-13 (Intel) est en cours de déprécation chez GitHub Actions
          # (runners très peu disponibles). Les Macs Intel restants peuvent
          # exécuter le DMG Apple Silicon via Rosetta 2 — c'est la pratique
          # standard. Si on veut un vrai build Intel un jour : `macos-13-large`
          # (payant) ou un runner self-hosted.
          - os: macos-14
            target: aarch64-apple-darwin
            label: macOS Apple Silicon (DMG)
            args: "--bundles dmg --target aarch64-apple-darwin"
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            label: Linux x64 (AppImage + .deb + .rpm)
            args: "--bundles appimage,deb,rpm"

    steps:
      - uses: actions/checkout@v4

      # ── Node pour le frontend ──
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # ── Rust toolchain ──
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # ── Cache Rust pour accélérer les builds répétés ──
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      # ── Dépendances système Linux pour Tauri ──
      - name: Install Linux Tauri dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            file \
            wget

      - name: Install frontend dependencies
        run: npm ci

      # ── Sanity check ──
      - name: Typecheck
        run: npm run typecheck

      - name: Tests
        run: npm test

      # ── Build Tauri ──
      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Glucose ${{ github.ref_name }}"
          releaseBody: |
            ## Téléchargements

            | OS | Fichier | Taille |
            |---|---|---|
            | 🪟 **Windows** (10/11) | `Glucose_*_x64-setup.exe` | NSIS · sans droits admin |
            | 🍎 **macOS** (M1+ natif, Intel via Rosetta 2) | `Glucose_*_aarch64.dmg` | universel |
            | 🐧 **Linux universel** | `glucose_*_amd64.AppImage` | Marche partout · NixOS via `nix-ld` |
            | 📦 **Debian / Ubuntu** | `glucose_*_amd64.deb` | `sudo dpkg -i` |
            | 🎩 **Fedora / RHEL** | `glucose-*.x86_64.rpm` | `sudo dnf install` |
            | ❄️ **NixOS** | flake | `nix run github:${{ github.repository }}` |

            ## Documentation
            - 📖 [Guide d'utilisation](https://github.com/${{ github.repository }}/blob/main/GUIDE.md)
            - 🗺️ [Roadmap](https://github.com/${{ github.repository }}/blob/main/ROADMAP.md)
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
